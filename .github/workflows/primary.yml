name: Primary

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  primary:
    uses: orcastration-ai/.github/.github/workflows/primary-static-site.yml@main
    with:
      site-id: docs-orcastration-ai
